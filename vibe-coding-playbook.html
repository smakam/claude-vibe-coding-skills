<script>
const phases = [
  {
    id: "before", title: "Before You Start", subtitle: "Set yourself up to win — whether it's a new project or an existing codebase", color: "#E8B931", icon: "🎯",
    sections: [
      {
        label: "Common",
        practices: [
          {
            title: "Bootstrap governance files before writing code",
            why: "Every agent session starts from zero. Without persistent context files, you're re-onboarding a new hire every time. This applies equally to new projects and existing codebases.",
            how: [
              "Create AGENTS.md with coding conventions, workflow rules, security guardrails, and repo map",
              "Set up ai/PLAN.md, ai/STATUS.md, ai/DECISIONS.md for task tracking — these are your session-to-session memory",

            ],
            antipattern: "Starting a session without AGENTS.md. The agent will guess at your conventions and guess wrong."
          },
          {
            title: "Use PLAN, STATUS, and DECISIONS — they're your session-to-session memory",
            why: "On greenfield, a bad plan wastes time. On existing codebases, a bad plan breaks things other teams depend on. These tracking files protect you from drift, rework, and the agent going rogue.",
            how: [
              "ai/PLAN.md: write the plan scoped to the actual architecture — whether you're building it or inheriting it",
              "ai/STATUS.md: update after every step — if a session dies mid-feature, the next session needs to know exactly where you left off and what was already changed",
              "ai/DECISIONS.md: record WHY you chose approach A over B — this prevents future sessions from re-litigating settled decisions",
              "Add a 'Files Modified' section to STATUS.md — essential for safe rollback on both new and existing codebases",
              "These are committed to git (DECISIONS.md) or gitignored (PLAN.md, STATUS.md) — know which is which"
            ],
            antipattern: "Skipping plan/status/decisions because 'it's a small change'. Small changes on large codebases cause the biggest incidents."
          }
        ]
      },
      {
        label: "New Projects",
        practices: [
          {
            title: "Write the PRD first, not the prompt",
            why: "Your AI agent is a fast but forgetful junior dev. Without a spec, it will make random architectural choices you'll spend hours undoing.",
            how: [
              "Write what the system does, who uses it, core user flows, and data model — even if rough",
              "For UI work, sketch wireframes (hand-drawn is fine — agents interpret screenshots well)",
              "Define your tech stack and specific versions (models may have stale knowledge of newer versions)",
              "Commit the PRD to the repo so every agent session has access to it"
            ],
            antipattern: "Jumping straight into prompting without knowing what you're building. You'll 'vibe' yourself into a rewrite."
          },
          {
            title: "Pick a simple, well-known tech stack",
            why: "Models generate dramatically better code for popular frameworks they've seen extensively in training data. Exotic stacks = more hallucinations.",
            how: [
              "Ask the model which version of a framework it knows before using it",
              "If you must use a newer version, paste the relevant docs into context",
              "Prefer standard patterns the model has seen millions of times",
              "Minimize dependencies — each one is a potential hallucination surface"
            ],
            antipattern: "Using the latest bleeding-edge release of everything and expecting the model to know it."
          }
        ]
      },
      {
        label: "Existing Codebases",
        practices: [
          {
            title: "Audit before you agent — never skip the reconnaissance",
            why: "On a greenfield project, bad AI output means wasted time. On an existing codebase, it means broken production systems. You need to understand what's there before letting an agent touch it.",
            how: [
              "Manually explore: directory structure, entry points, build system, test coverage, CI/CD pipeline",
              "Identify the tech stack, dependency versions, coding patterns, and naming conventions already in use",
              "Map the 'danger zones' — auth, payments, migrations, infra — before the agent discovers them the hard way",
              "Check test coverage: if it's low, write tests for the areas you'll be changing BEFORE you start prompting"
            ],
            antipattern: "Pointing an agent at a 200k-line repo and saying 'add a feature'. It will hallucinate half the architecture."
          },
          {
            title: "Generate the AGENTS.md from the existing repo, don't write it from scratch",
            why: "An existing codebase already has conventions, patterns, and implicit rules. Your governance file needs to reflect reality, not aspirations.",
            how: [
              "Ask the agent to analyze the repo first: 'Scan this codebase and describe the architecture, conventions, patterns, and tech stack. Don't change anything.'",
              "Review the agent's analysis against your own understanding — it will miss things and get some wrong",
              "Build AGENTS.md from this analysis: actual linter configs, actual test commands, actual directory purposes",
              "Include repo-specific gotchas: 'We use a custom ORM wrapper in src/db/', 'All API routes go through the middleware in src/middleware/auth.ts'",
              "<strong>Shortcut:</strong> use the <code>vibe-coding-bootstrap-existing-repo</code> Claude Code skill (<a href='https://github.com/smakam/claude-vibe-coding-skills' target='_blank' style='color:#B07CC6'>github.com/smakam/claude-vibe-coding-skills</a>) — it scans the repo, proposes AGENTS.md, CLAUDE.md, and ai/ tracking files tailored to your detected stack, and requests approval before writing anything"
            ],
            antipattern: "Copy-pasting a generic AGENTS.md template. If the rules don't match the actual codebase, the agent will ignore reality and follow the template."
          },
          {
            title: "Scope changes surgically — the codebase is not yours to redesign",
            why: "Agents love to refactor. On an existing codebase with real users, unsolicited refactoring is a production incident waiting to happen.",
            how: [
              "Explicitly constrain: 'Only modify files in src/features/cart/. Do not touch anything else.'",
              "Add to rules: 'Match existing code style exactly. Do not introduce new patterns unless asked.'",
              "Add to rules: 'Do not refactor, rename, or reorganize existing code. Only add or modify what's requested.'",
              "For any change touching more than 3 files, require the agent to list affected files and get approval first"
            ],
            antipattern: "Asking for a bug fix and getting back a diff that 'also cleaned up' 12 unrelated files."
          },
          {
            title: "Use the existing test suite as your safety net",
            why: "The existing tests encode business logic that nobody fully remembers. If they pass after your change, you probably didn't break anything critical.",
            how: [
              "Run the full test suite BEFORE any AI changes — establish a green baseline",
              "After every AI change, run the full suite, not just new tests",
              "If existing tests fail, the AI broke something — revert, don't 'fix' the test",
              "If test coverage is low in your target area, write characterization tests first: tests that capture current behavior, right or wrong"
            ],
            antipattern: "Letting the agent 'fix' a failing test by changing the assertion. That test was protecting something."
          },
          {
            title: "Read the code the agent will touch — before it touches it",
            why: "You can't review a diff if you don't understand the before state. On existing codebases, the context around a change matters more than the change itself.",
            how: [
              "Before prompting, read the files the agent will modify — understand the current logic",
              "Look for non-obvious dependencies: event listeners, side effects, implicit contracts between modules",
              "Check git blame for recent changes — if someone just refactored this area, tread carefully",
              "Understand the data flow: where does input come from, where does output go, what else depends on this"
            ],
            antipattern: "Reviewing a +50/-30 diff without knowing what the original 200 lines were doing."
          },
          {
            title: "Onboard the agent incrementally, not all at once",
            why: "Dumping the entire codebase into context overwhelms the model. It needs the right slice of context for the specific task.",
            how: [
              "Start with AGENTS.md (high-level map) + the specific files relevant to the current task",
              "Use @file references (Cursor) or explicit file paths (Claude Code) to point at relevant code",
              "For cross-cutting changes, break into phases: 'First, understand the current auth flow by reading these 3 files'",
              "Let the agent ask questions: 'Before implementing, what questions do you have about the existing code?'"
            ],
            antipattern: "Pasting 5000 lines of code into a prompt and hoping the model figures out what matters."
          },
          {
            title: "Treat legacy patterns as constraints, not problems to solve",
            why: "The agent will want to modernize everything. But legacy patterns often exist for reasons nobody documented — and changing them has hidden blast radius.",
            how: [
              "Explicitly state in rules: 'This codebase uses [pattern X]. Continue using it. Do not suggest alternatives.'",
              "If you DO want to modernize, do it as a separate dedicated task with its own plan — never mixed with feature work",
              "Document known technical debt in AGENTS.md so the agent understands it's intentional, not a mistake to fix",
              "When the agent suggests a 'better' approach, ask: 'What would break if we changed this?' — it usually can't answer"
            ],
            antipattern: "Letting the agent introduce async/await into a codebase that's consistently callback-based. Now you have two patterns."
          }
        ]
      }
    ]
  },
  {
    id: "during", title: "During Development", subtitle: "How to drive the agent effectively", color: "#4A90D9", icon: "⚡",
    practices: [
      {
        title: "Decompose ruthlessly — one concern per prompt",
        why: "Large prompts produce large, messy, hard-to-review diffs. Small prompts produce surgical changes you can verify and commit.",
        how: [
          "Break features into the smallest possible independent steps",
          "Each prompt should touch 1–2 files ideally, 3–4 max",
          "If a task has more than 3 steps, write it up in ai/PLAN.md first",
          "Use the pattern: scaffold → implement → test → optimize"
        ],
        antipattern: "'Build me a full e-commerce checkout flow' as a single prompt. You'll get a fragile monolith."
      },
      {
        title: "Ask for options before committing to an approach",
        why: "Once the agent starts writing code, it's biased toward its own approach. Get the thinking out first.",
        how: [
          "Prompt: 'Give me 3 approaches for X, starting with the simplest. Explain tradeoffs. Don't write code.'",
          "For architectural decisions, use 'Ask mode' or conversation before 'Code mode'",
          "Record the chosen approach and reasoning in ai/DECISIONS.md",
          "This takes 30 seconds and saves hours of rework"
        ],
        antipattern: "Letting the agent pick the architecture. It optimizes for 'looks plausible' not 'right for your system'."
      },
      {
        title: "Enforce explain-before-execute",
        why: "Agents are overconfident interns. They'll refactor your entire codebase if you don't constrain them.",
        how: [
          "Add to your rules: 'Explain what you'll do and get confirmation before coding'",
          "Add: 'Prefer minimal diffs — only change what's necessary'",
          "Add: 'Do not refactor existing code unless explicitly asked'",
          "Add: 'Keep it simple. Implement the minimum viable version.'"
        ],
        antipattern: "Giving the agent free rein and reviewing after. By then, it's touched 15 files and you can't tell what happened."
      },
      {
        title: "Manage context like a budget",
        why: "Context windows are finite. A bloated context leads to worse output, ignored instructions, and hallucinations.",
        how: [
          "Start a fresh chat for each feature — don't carry unrelated context",
          "Use file-scoped rules (e.g., Cursor lets rules apply only to *.ts files)",
          "Reference docs by path ('see docs/ARCHITECTURE.md') instead of pasting them in",
          "If a session gets long, ask for a summary, then start fresh with that summary + STATUS.md"
        ],
        antipattern: "One mega-session where you build an entire feature. By prompt 30, the agent has forgotten prompt 3."
      },
      {
        title: "Commit before and after every AI interaction",
        why: "Git is your undo button. Without a clean checkpoint, one bad AI suggestion can corrupt your entire working state.",
        how: [
          "Commit before prompting — create a known-good restore point",
          "Review the diff after each AI change (not just the new code — understand what changed)",
          "Commit with descriptive messages: 'feat: add cart API endpoints' not 'AI changes'",
          "Use feature branches — never let agents work directly on main"
        ],
        antipattern: "Accepting 10 rounds of AI changes without committing, then discovering something broke 6 rounds ago."
      },
      {
        title: "Run tests after every change, not at the end",
        why: "AI-generated code introduces subtle bugs. Catching them immediately is 10x easier than after 20 more changes are layered on top.",
        how: [
          "Add to workflow rules: 'Run the test suite after every change. Stop if tests fail.'",
          "Write tests first (TDD) — they become the spec the agent implements against",
          "Prefer integration/e2e tests over units for vibe-coded projects (they catch more real bugs)",
          "If the agent 'fixes' a test by weakening the assertion, reject it immediately"
        ],
        antipattern: "Building 5 features, then running tests, then spending 3 hours debugging cascading failures."
      }
    ]
  },
  {
    id: "review", title: "Review & Verification", subtitle: "Trust but verify — always verify", color: "#D95B43", icon: "🔍",
    practices: [
      {
        title: "Review AI output like a pull request, not a gift",
        why: "25–70% of AI-generated code contains vulnerabilities. 'It works' is not the same as 'it's correct'.",
        how: [
          "Read every diff line by line — don't just check if it runs",
          "Look for: hallucinated APIs, hardcoded secrets, missing error handling, skipped edge cases",
          "Check for unnecessary complexity or over-engineering the agent snuck in",
          "If you can't understand what the code does, don't ship it"
        ],
        antipattern: "'The tests pass so it's fine.' That's how you end up with an SQL injection in production."
      },
      {
        title: "Never let AI touch security-critical code unsupervised",
        why: "Models optimize for 'looks correct' not 'is secure'. Auth, payments, and data handling need human eyes.",
        how: [
          "Mark danger zones in AGENTS.md: auth, billing, migrations, infrastructure, CI/CD",
          "Rule: 'Do NOT modify files in these directories without explicit approval'",
          "Run SAST on every AI-generated change: Semgrep for multi-language pattern analysis, Bandit for Python, CodeQL for deep dataflow analysis, Snyk for dependency vulnerabilities, and a secrets scanner (truffleHog, gitleaks) on every commit",
          "Include security requirements in prompts: 'Add input validation, parameterized queries, CSRF protection, and follow OWASP Top 10 guidelines'",
          "Store team-specific security requirements in docs/code-review-standards.md and reference it in every code review agent invocation — this is how you make security checks consistently enforced, not ad-hoc"
        ],
        antipattern: "Letting the agent scaffold your auth system and deploying it without a security review."
      },
      {
        title: "Track decisions so agents don't re-litigate them",
        why: "Without a decision log, your next agent session might undo architectural choices you carefully made.",
        how: [
          "Record every significant decision in ai/DECISIONS.md with date, context, alternatives, and reasoning",
          "Add to rules: 'Read ai/DECISIONS.md before proposing architectural changes'",
          "Add: 'If you want to contradict a prior decision, STOP and explain why'",
          "This is committed to git — it's your institutional memory"
        ],
        antipattern: "Spending 20 minutes re-explaining to a new session why you chose SQLite over Postgres."
      }
    ]
  },
  {
    id: "debug", title: "Debugging & Recovery", subtitle: "When the agent is stuck, broken, or going in circles", color: "#E07C4F", icon: "🔧",
    practices: [
      {
        title: "Recognize the loop — 3 failed attempts means change strategy",
        why: "Agents don't get frustrated, but they also don't get smarter on retry. If the same approach failed twice, the third attempt will produce the same wrong answer with more confidence.",
        how: [
          "Rule of 3: if 3 prompts haven't solved it, STOP. Don't keep rephrasing the same ask.",
          "Diagnose first: 'Explain what you think is happening and why your fix didn't work. Don't write code.'",
          "Change the angle: provide more context, simplify the problem, or break it into a smaller piece",
          "Last resort: read the code yourself. 15 minutes of reading often beats 45 minutes of re-prompting."
        ],
        antipattern: "Prompt #8 of 'try again, that didn't work' while the agent confidently produces the same bug with different variable names."
      },
      {
        title: "Give the agent the error, not just the symptom",
        why: "Agents are surprisingly good at debugging when given precise error information. They're terrible when given 'it doesn't work'.",
        how: [

          "Include what you expected vs. what actually happened",
          "If it's a UI bug, describe or screenshot the exact behavior",

        antipattern: "'The login page is broken, fix it.' Give the agent the 404 response, the network tab output, and the server log."
      },
      {

        why: "After several failed attempts, the conversation history is full of wrong approaches. The agent weighs its own prior (incorrect) outputs heavily and keeps circling back to them.",

          "Bring forward only: the goal, the current state (STATUS.md), and the specific error",
          "Do NOT paste the failed attempts — they pollute context and bias the agent toward the same mistakes",
          "Sometimes switching tools helps: if Claude Code is stuck, try the same prompt in Cursor or vice versa"

        antipattern: "A 50-message thread where 40 messages are failed attempts. The agent can't see the forest for the trees."
      },
      {

        how: [

          "git checkout -- file: revert specific files to last commit",
          "git reset --hard HEAD~N: nuclear option to roll back N commits",
          "If you followed 'commit after every step', you always have a clean restore point within the last 10 minutes of work"

        antipattern: "No commits for the last hour, agent has modified 8 files, something's broken, and you don't know which change caused it."

const loopSteps = [
  { step: "1", text: "Plan the feature (PRD or PLAN.md)", c: "#E8B931" },
  { step: "2", text: "Git commit (checkpoint)", c: "#E8B931" },
  { step: "3", text: "Write one small, specific prompt", c: "#4A90D9" },
  { step: "4", text: "Review the diff line by line", c: "#D95B43" },
  { step: "5", text: "Run tests + linter", c: "#D95B43" },
  { step: "6", text: "Git commit (or revert)", c: "#6B8F71" },
  { step: "7", text: "Update STATUS.md → next step", c: "#6B8F71" },
  { step: "→", text: "Repeat from 3", c: "#8B949E" }
];

let activePhase = "before";
let activeSubTab = {};
let expandedPractice = null;

function renderPractices(practices, phase, globalIdx) {
  return practices.map((pr, idx) => {
    const num = globalIdx + idx;
    const key = `${activePhase}-${num}`;
    const isExpanded = expandedPractice === key;
    return `
      <div class="practice ${isExpanded ? 'expanded' : ''}"
           style="${isExpanded ? 'border-color:' + phase.color + '40' : ''}">
        <button class="practice-header" onclick="togglePractice('${key}')">
          <span class="practice-num" style="color:${phase.color}">${String(num+1).padStart(2,'0')}</span>
          <span class="practice-title">${pr.title}</span>
          <span class="practice-arrow">›</span>
        </button>
        <div class="practice-body">
          <div class="section">
            <div class="section-label" style="color:${phase.color}">Why</div>
            <div>${pr.why}</div>
          </div>
          <div class="section">
            <div class="section-label" style="color:${phase.color}">How</div>
            ${pr.how.map(h => `<div class="how-item"><span class="how-arrow">→</span><span>${h}</span></div>`).join("")}
          </div>
          <div class="antipattern">
            <span class="antipattern-label">⚠ Don't </span>
            <span class="antipattern-text">${pr.antipattern}</span>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function render() {
  // Tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = phases.map(p => `
    <button class="tab ${activePhase === p.id ? 'active' : ''}"
            style="${activePhase === p.id ? 'border-top-color:' + p.color : ''}"
            onclick="setPhase('${p.id}')">
      <div class="tab-icon">${p.icon}</div>
      <div class="tab-label">${p.title}</div>
    </button>
  `).join("");

  // Content
  const phase = phases.find(p => p.id === activePhase);
  const contentEl = document.getElementById("phaseContent");
  contentEl.style.borderTopColor = phase.color;

  if (phase.sections) {
    // Sectioned phase with sub-tabs
    const currentSub = activeSubTab[phase.id] || phase.sections[0].label;
    const subTabsHtml = `<div class="sub-tabs">
      ${phase.sections.map(s => `
        <button class="sub-tab ${currentSub === s.label ? 'active' : ''}"
                style="${currentSub === s.label ? 'background:' + phase.color + '22; border-color:' + phase.color : ''}"
                onclick="setSubTab('${phase.id}', '${s.label}')">
          ${s.label}
        </button>
      `).join("")}
    </div>`;

    const activeSection = phase.sections.find(s => s.label === currentSub) || phase.sections[0];
    // Calculate global index offset for numbering
    let globalIdx = 0;
    for (const s of phase.sections) {
      if (s.label === activeSection.label) break;
      globalIdx += s.practices.length;
    }

    contentEl.innerHTML = `
      <div class="phase-subtitle">${phase.subtitle}</div>
      ${subTabsHtml}
      <div class="practices">
        ${renderPractices(activeSection.practices, phase, globalIdx)}
      </div>
    `;
  } else {
    // Standard flat phase
    contentEl.innerHTML = `
      <div class="phase-subtitle">${phase.subtitle}</div>
      <div class="practices">
        ${renderPractices(phase.practices, phase, 0)}
      </div>
    `;
  }

  // Loop steps
  document.getElementById("loopSteps").innerHTML = loopSteps.map(s => `
    <div class="loop-step">
      <span class="loop-num" style="color:${s.c}">${s.step}</span>
      <span>${s.text}</span>
    </div>
  `).join("");
}

function setPhase(id) {
  activePhase = id;
  expandedPractice = null;
  render();
}

function setSubTab(phaseId, label) {
  activeSubTab[phaseId] = label;
  expandedPractice = null;
  render();
}

function togglePractice(key) {
  expandedPractice = expandedPractice === key ? null : key;
  render();
}

render();
</script>
